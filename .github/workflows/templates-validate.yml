name: Validate templates

on:
  push:
    branches: ["**"]
    paths:
      - "templates/**"
      - "tests/**"
      - "scripts/**"
      - "pytest.ini"
      - ".github/workflows/templates-validate.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "templates/**"
      - "tests/**"
      - "scripts/**"
      - "pytest.ini"
      - ".github/workflows/templates-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: pip install -r scripts/requirements-validate.txt

      - name: Run template tests (same as Sonar job)
        run: pytest tests/ -q
