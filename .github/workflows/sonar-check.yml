name: Sonar Check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  mvn-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so SonarScanner can attach SCM blame (no shallow-clone warning).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Template tests (coverage + JUnit for Sonar)
        run: |
          pip install -r scripts/requirements-validate.txt
          pytest tests/ \
            --cov=scripts \
            --cov-report=xml \
            --junitxml=pytest-report.xml \
            -q

      - name: Build template github package
        uses: netcracker/qubership-workflow-hub/actions/maven-snapshot-deploy@main
        with:
          java-version: 21
          # Default target-store is "central"; the action then adds -Pcentral and GPG runs. Sonar only needs -Pgithub.
          target-store: github
          maven-command: >
            --batch-mode clean verify
            org.sonarsource.scanner.maven:sonar-maven-plugin:${{ vars.SONAR_PLUGIN_VERSION }}:sonar
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL }}
          maven-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}