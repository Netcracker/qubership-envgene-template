# This repo packages templates via Maven (assembly ZIP), not Java sources.
# SonarScanner for Maven defaults to src/main/java — override so analysis sees real content.
sonar.sources=templates,src/assembly,.github

sonar.exclusions=**/.idea/**,**/target/**,**/node_modules/**

# No tests or coverage reports: all sources excluded from coverage metrics (see sonar.coverage.exclusions in Sonar docs).
# SonarCloud Overview may still show the "Coverage / few extra steps" hint until a report is imported — that is UI onboarding, not fixed by this property.
sonar.coverage.exclusions=**/*
