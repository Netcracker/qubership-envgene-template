# This repo packages templates via Maven (assembly ZIP), not Java sources.
# SonarScanner for Maven defaults to src/main/java — override so analysis sees real content.
sonar.sources=templates,src/assembly,.github,scripts,tests

sonar.tests=tests

sonar.exclusions=**/.idea/**,**/target/**,**/node_modules/**

# Template YAML/Jinja is not executed by pytest; coverage applies to Python under scripts/ (see CI pytest --cov).
sonar.coverage.exclusions=templates/**,.github/**,src/assembly/**

# Produced in CI before sonar: pytest --cov --cov-report=xml --junitxml=pytest-report.xml
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=pytest-report.xml
