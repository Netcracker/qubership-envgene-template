---
# Root environment template. Wire this in env_definition.yml (templateArtifact) after publishing as an artifact.
# deploy_postfix on each namespace entry must match Solution Descriptor deployPostfix for that application.
tenant: "{{ templates_dir }}/env_templates/postgres-oss/tenant.yml.j2"
cloud:
  template_path: "{{ templates_dir }}/env_templates/postgres-oss/cloud.yml.j2"
  template_override:
    deployParameterSets: []
    e2eParameterSets: []
    technicalConfigurationParameterSets: []
namespaces:
  - template_path: "{{ templates_dir }}/env_templates/postgres-oss/Namespaces/pg.yml.j2"
    deploy_postfix: "pg"
